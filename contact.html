<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <!-- Tailwind CDN -->
    <script src="https://tailwindcss.com"></script>
</head>

<body class="bg-gray-100 text-gray-800 font-sans">
   <!-- Navigation Bar -->
    <nav class="bg-blue-600 p-4 text-white shadow-md">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <span class="font-bold text-xl">My Website</span>
            <div class="space-x-4">
               <a href="about.html" class="hover:underline">About</a>
                <a href="contact.html" class="underline font-semibold">Contact</a> 
            </div>
        </div>
    </nav> 
     <!-- Main Content -->
    <main class="max-w-4xl mx-auto mt-10 p-6 bg-white rounded-lg shadow-lg">
        <h1 class="text-3xl font-bold text-blue-600 mb-6">Contact Us</h1>
         <!-- Contact Form -->
        <form class="space-y-4">
         <div>
                <label class="block text-sm font-semibold mb-1">Your Name</label>
                <input type="text" class="w-full p-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="John Doe">
            </div>
            <div>
            	 <div>
                <label class="block text-sm font-semibold mb-1">Your Email</label>
                <input type="email" class="w-full p-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="john@example.com">
            </div>
             <div>
                <label class="block text-sm font-semibold mb-1">Message</label>
                <textarea class="w-full p-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500 h-28" placeholder="Type your message here..."></textarea>
            </div>
            <div>
                <label class="block text-sm font-semibold mb-1">Errors</label>
                <textarea class="w-full p-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500 h-28" placeholder="Type your message here..."></textarea>
            </div>
 <div>
                <label class="block text-sm font-semibold mb-1">Fixed it</label>
                <textarea class="w-full p-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500 h-28" placeholder="Type your message here..."></textarea>
            </div>

 <div>
                <label class="block text-sm font-semibold mb-1">Information Enter</label>
                <textarea class="w-full p-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500 h-28" placeholder="Type your message here..."></textarea>
            </div>
 <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded font-bold hover:bg-blue-700 transition">
                Send Message
            </button>
        </form>
    </main>

   
</body>
</html>
